- name: Ensure Docker is installed
  become: true
  apt:
    name: docker.io
    state: present
    update_cache: yes

- name: Install Docker Compose
  become: true
  apt:
    name: docker-compose
    state: present

- name: Ensure target directory exists
  file:
    path: /home/team_user/map-service
    state: directory
    mode: '0755'

- name: Copy docker-compose.app.yaml
  copy:
    src: "{{ playbook_dir }}/../../docker-compose.app.yaml"
    dest: /home/team_user/map-service/docker-compose.app.yaml

- name: Stop and remove existing containers
  become: true
  community.docker.docker_container:
    name: map-service
    state: absent

- name: Deploy with Docker Compose
  shell: docker-compose -f docker-compose.app.yaml pull && docker-compose -f docker-compose.app.yaml up -d
  args:
    chdir: /home/team_user/map-service

- name: Wait for services to start (30 seconds)
  wait_for:
    timeout: 30

- name: Copy certificate from Minio container
  shell: docker cp /etc/ssl/certs/nginx-selfsigned.crt map-service:/tmp/minio.crt

- name: Import certificate into truststore
  shell: |
    docker exec map-service keytool -import -alias minio -keystore /opt/java/openjdk/lib/security/cacerts -file /tmp/minio.crt -storepass changeit -noprompt

- name: Restart map-service container to apply changes
  shell: docker restart map-service
  async: 45
  poll: 0

- name: Clean up temporary file
  file:
    path: minio.crt
    state: absent